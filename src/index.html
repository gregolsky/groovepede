<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groovepede — Your Spotify album listening inbox</title>
  <meta name="description" content="A minimalist, local-first PWA for queuing Spotify albums. Save recommendations, browse them by genre from Last.fm, see artist bios, and check them off as you listen.">
  <meta name="keywords" content="spotify, albums, music queue, listening list, last.fm, pwa, music recommendations">
  <meta name="author" content="Grzegorz Lachowski">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1DB954">
  <link rel="canonical" href="https://gregolsky.github.io/groovepede/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gregolsky.github.io/groovepede/">
  <meta property="og:title" content="Groovepede — Your Spotify album listening inbox">
  <meta property="og:description" content="Never lose a great album recommendation again. Save Spotify albums, browse them by genre from Last.fm, and check them off as you listen.">
  <!-- Replace og-image.png with a real 1200×630 promotional image before launch -->
  <meta property="og:image" content="https://gregolsky.github.io/groovepede/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Groovepede — album listening inbox for Spotify">
  <meta property="og:site_name" content="Groovepede">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://gregolsky.github.io/groovepede/">
  <meta name="twitter:title" content="Groovepede — Your Spotify album listening inbox">
  <meta name="twitter:description" content="Never lose a great album recommendation again. Save Spotify albums, browse them by genre from Last.fm, and check them off as you listen.">
  <meta name="twitter:image" content="https://gregolsky.github.io/groovepede/og-image.png">
  <meta name="twitter:image:alt" content="Groovepede — album listening inbox for Spotify">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Groovepede",
    "url": "https://gregolsky.github.io/groovepede/",
    "description": "A minimalist, local-first PWA for queuing Spotify albums. Save recommendations, browse them by genre from Last.fm, see artist bios, and check them off as you listen.",
    "applicationCategory": "MusicApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires JavaScript. Requires HTML5.",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Person", "name": "Grzegorz Lachowski" }
  }
  </script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#000" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="6"  stroke="#000" stroke-width="1.2"/>
          <circle cx="12" cy="12" r="2.2" fill="#000"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Groovepede</h1>
        <p>Your album listening inbox</p>
      </div>
    </div>
    <div id="auth-area"></div>
  </div>
  <div id="app"></div>
</div>
